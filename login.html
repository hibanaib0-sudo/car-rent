<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login · LuxeRent</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h2 { margin-bottom: 24px; color: #0b0b0b; text-align: center; }
    input { width: 100%; padding: 14px; margin-bottom: 16px; border: 2px solid #eaeaea; border-radius: 12px; outline: none; box-sizing: border-box; }
    button { width: 100%; padding: 16px; background: #0b0b0b; color: white; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .error { color: #e74c3c; font-size: 0.9rem; margin-bottom: 16px; text-align: center; display: none; }
  </style>
</head>
<body>

  <div class="login-card">
    <h2>Admin Login</h2>
    <div class="error" id="errorMsg">Invalid credentials</div>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Admin Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// Use your full, verified configuration block here:
const firebaseConfig = {
  apiKey: "AIzaSyC7g7VKQs0r9hxwIlnUJxMPdI7JEhxPqAg",
  authDomain: "car-rental-site-28fd2.firebaseapp.com",
  projectId: "car-rental-site-28fd2",
  storageBucket: "car-rental-site-28fd2.firebasestorage.app",
  messagingSenderId: "43976613134",
  appId: "1:43976613134:web:3c4bbccea761ee278dcb5f"
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      try {
        await signInWithEmailAndPassword(auth, email, password);
        // Success! Redirect to your admin dashboard
        window.location.href = 'admin.html';
      } catch (error) {
        errorMsg.textContent = "❌ Access Denied: " + error.message;
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
