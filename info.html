<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Complete Your Rental · LuxeRent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #0b0b0b;
      --dark-gray: #1f1f1f;
      --metallic: #a8a8a8;
      --light-gray: #f5f5f5;
      --white: #ffffff;
      --shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25);
      --border-radius: 32px;
      --success: #27ae60;
      --error: #e74c3c;
      
      /* Card brand colors */
      --visa-color: #1a1f71;
      --mastercard-color: #eb001b;
      --amex-color: #006fcf;
      --discover-color: #ff6000;
      --paypal-color: #003087;
      --default-card: #555;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--light-gray);
      color: var(--dark-gray);
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      background: var(--white);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(2px);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--black);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .logo span {
      color: var(--metallic);
      font-weight: 300;
    }
    .logo i {
      color: var(--dark-gray);
      margin-right: 6px;
    }

    .back-link {
      text-decoration: none;
      color: var(--dark-gray);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #e0e0e0;
      padding: 8px 20px;
      border-radius: 40px;
      transition: 0.2s;
      font-size: 0.95rem;
    }
    .back-link:hover {
      background: var(--black);
      color: white;
      border-color: var(--black);
    }

    .checkout-container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    /* ----- Order Summary ----- */
    .order-summary {
      background: var(--white);
      border-radius: var(--border-radius);
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid #f0f0f0;
      height: fit-content;
      position: sticky;
      top: 100px;
    }

    .order-summary h2 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--black);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .order-summary h2 i {
      color: var(--metallic);
    }

    .order-car {
      display: flex;
      gap: 16px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
      margin-bottom: 20px;
    }
    .order-car img {
      width: 100px;
      height: 70px;
      object-fit: cover;
      border-radius: 12px;
    }
    .order-car .car-info h3 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--black);
    }
    .order-car .car-info .price {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--black);
      margin-top: 4px;
    }
    .order-car .car-info .price small {
      font-weight: 400;
      color: #777;
      font-size: 0.9rem;
    }

    .order-details {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .order-details .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 0.95rem;
      border-bottom: 1px solid #f5f5f5;
    }
    .order-details .row.total {
      border-top: 2px solid var(--black);
      border-bottom: none;
      padding-top: 16px;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--black);
      margin-top: 4px;
    }

    /* ----- Payment Form ----- */
    .payment-form {
      background: var(--white);
      border-radius: var(--border-radius);
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid #f0f0f0;
    }

    .payment-form h2 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--black);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .payment-form h2 i {
      color: var(--metallic);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--dark-gray);
      font-size: 0.9rem;
    }
    .form-group label .required {
      color: var(--error);
      margin-left: 2px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      border: 2px solid #eaeaea;
      border-radius: 12px;
      transition: all 0.3s ease;
      background: var(--white);
      color: var(--dark-gray);
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--metallic);
      box-shadow: 0 0 0 4px rgba(168, 168, 168, 0.1);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ----- CARD DETECTION ----- */
    .card-input-wrapper {
      position: relative;
    }

    .card-detection-badge {
      display: none;
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: white;
      pointer-events: none;
      animation: fadeIn 0.3s ease;
      z-index: 5;
    }

    .card-detection-badge.visible {
      display: block;
    }

    .card-detection-badge.visa {
      background: var(--visa-color);
    }
    .card-detection-badge.mastercard {
      background: var(--mastercard-color);
    }
    .card-detection-badge.amex {
      background: var(--amex-color);
    }
    .card-detection-badge.discover {
      background: var(--discover-color);
    }
    .card-detection-badge.paypal {
      background: var(--paypal-color);
    }
    .card-detection-badge.default-card {
      background: var(--default-card);
    }

    .card-icons-detected {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .card-icons-detected .card-icon {
      font-size: 2rem;
      opacity: 0.2;
      transition: all 0.3s ease;
    }
    .card-icons-detected .card-icon.active {
      opacity: 1;
      transform: scale(1.1);
    }
    .card-icons-detected .card-icon.visa-icon { color: var(--visa-color); }
    .card-icons-detected .card-icon.mastercard-icon { color: var(--mastercard-color); }
    .card-icons-detected .card-icon.amex-icon { color: var(--amex-color); }
    .card-icons-detected .card-icon.discover-icon { color: var(--discover-color); }
    .card-icons-detected .card-icon.paypal-icon { color: var(--paypal-color); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-50%) scale(0.8); }
      to { opacity: 1; transform: translateY(-50%) scale(1); }
    }

    .btn-submit {
      width: 100%;
      background: var(--black);
      color: white;
      font-weight: 600;
      font-size: 1.2rem;
      padding: 16px;
      border-radius: 60px;
      border: none;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 0.3px;
      box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.3);
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .btn-submit:hover {
      background: #2a2a2a;
      transform: scale(1.02);
      box-shadow: 0 18px 32px -10px rgba(0, 0, 0, 0.4);
    }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-submit i {
      font-size: 1rem;
    }

    .message-box {
      display: none;
      padding: 20px 24px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-weight: 500;
    }
    .message-box.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message-box.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ----- Responsive ----- */
    @media (max-width: 900px) {
      .checkout-container {
        grid-template-columns: 1fr;
        gap: 30px;
      }
      .order-summary {
        position: static;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 500px) {
      header {
        padding: 16px 20px;
      }
      .logo {
        font-size: 1.4rem;
      }
      .back-link {
        font-size: 0.85rem;
        padding: 6px 14px;
      }
      .checkout-container {
        padding: 0 16px;
        margin: 20px auto;
      }
      .payment-form,
      .order-summary {
        padding: 20px;
      }
      .order-car img {
        width: 70px;
        height: 50px;
      }
      .btn-submit {
        font-size: 1rem;
        padding: 14px;
      }
      .card-icons-detected .card-icon {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->

      <i class="fas fa-car-side"></i> LUXE<span>RENT</span>

    <a href="rentnow.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to catalog</a>

  <!-- CHECKOUT CONTAINER -->

    <!-- LEFT: Order Summary -->

      <h2><i class="fas fa-receipt"></i> Order Summary</h2>

    <!-- RIGHT: Payment Form -->
    <section class="payment-form" id="paymentForm">
      <h2><i class="fas fa-credit-card"></i> Payment Information</h2>

      <div class="message-box" id="messageBox"></div>

      <form id="checkoutForm" novalidate>
        <!-- Personal Information -->
        <div class="form-group">
          <label>Full Name <span class="required">*</span></label>
          <input type="text" id="fullName" placeholder="John Doe" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email Address <span class="required">*</span></label>
            <input type="email" id="email" placeholder="john@example.com" required />
          </div>
          <div class="form-group">
            <label>Phone Number <span class="required">*</span></label>
            <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required />
          </div>
        </div>

        <div class="form-group">
          <label>Pickup Location <span class="required">*</span></label>
          <select id="pickupLocation" required>
            <option value="">Select a location...</option>
            <option value="downtown">Downtown Los Angeles</option>
            <option value="airport">LAX Airport</option>
            <option value="beverly">Beverly Hills</option>
            <option value="santa">Santa Monica</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Pickup Date <span class="required">*</span></label>
            <input type="date" id="pickupDate" required />
          </div>
          <div class="form-group">
            <label>Return Date <span class="required">*</span></label>
            <input type="date" id="returnDate" required />
          </div>
        </div>

        <hr style="border: none; border-top: 2px solid #f0f0f0; margin: 24px 0;" />

        <!-- Payment Details with Card Detection -->
        <div class="form-group">
          <label>Card Number <span class="required">*</span></label>
          <div class="card-input-wrapper">
            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required />
            <span class="card-detection-badge" id="cardBadge">Visa</span>
          </div>
          
          <!-- Card icons with detection -->
          <div class="card-icons-detected" id="cardIcons">
            <i class="fab fa-cc-visa card-icon visa-icon" id="visaIcon"></i>
            <i class="fab fa-cc-mastercard card-icon mastercard-icon" id="mastercardIcon"></i>
            <i class="fab fa-cc-amex card-icon amex-icon" id="amexIcon"></i>
            <i class="fab fa-cc-discover card-icon discover-icon" id="discoverIcon"></i>
            <i class="fab fa-cc-paypal card-icon paypal-icon" id="paypalIcon"></i>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Expiry Date <span class="required">*</span></label>
            <input type="text" id="expiryDate" placeholder="MM/YY" maxlength="5" required />
          </div>
          <div class="form-group">
            <label>CVV <span class="required">*</span></label>
            <input type="text" id="cvv" placeholder="123" maxlength="4" required />
          </div>
        </div>

        <div class="form-group">
          <label>Additional Notes</label>
          <textarea id="notes" placeholder="Special requests, driving preferences, etc."></textarea>
        </div>

        <div style="display: flex; align-items: center; gap: 12px; margin: 16px 0;">
          <input type="checkbox" id="terms" required style="width: 18px; height: 18px; cursor: pointer;" />
          <label for="terms" style="font-size: 0.9rem; cursor: pointer;">
            I agree to the <a href="#" style="color: var(--black); font-weight: 600;">Terms & Conditions</a> and confirm all information is correct. <span class="required">*</span>
          </label>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span id="btnText">Confirm &amp; Book</span>
          <i class="fas fa-lock" id="btnIcon"></i>
          <span class="spinner" id="btnSpinner"></span>
        </button>
      </form>
    </section>

    // -------------------------------------------------------------
    // 2. UTILITY FUNCTIONS
    // -------------------------------------------------------------
    function getParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    function findCarById(id) {
      return carData.find(car => car.id === id);
    }

    // -------------------------------------------------------------
    // 3. CARD DETECTION SYSTEM
    // -------------------------------------------------------------
    function detectCardType(cardNumber) {
      const clean = cardNumber.replace(/\s/g, '');
      if (!clean || clean.length < 2) return null;

      if (/^4/.test(clean)) return 'visa';
      if (/^5[1-5]/.test(clean) || /^2[2-7][2-7][0-9]/.test(clean)) return 'mastercard';
      if (/^3[4|7]/.test(clean)) return 'amex';
      if (/^6011/.test(clean) || /^65/.test(clean) || /^64[4-9]/.test(clean) || /^622[1-9][2-9][0-9]/.test(clean)) return 'discover';
      if (/^[89]/.test(clean)) return 'paypal';
      
      return 'default-card';
    }

    function getCardDisplayName(type) {
      const names = {
        'visa': 'Visa',
        'mastercard': 'Mastercard',
        'amex': 'American Express',
        'discover': 'Discover',
        'paypal': 'PayPal',
        'default-card': 'Card'
      };
      return names[type] || 'Card';
    }

    function updateCardDetection() {
      const value = cardInput.value;
      const detectedType = detectCardType(value);
      
      Object.values(iconElements).forEach(icon => {
        icon.classList.remove('active');
      });

      cardBadge.classList.remove('visible', 'visa', 'mastercard', 'amex', 'discover', 'paypal', 'default-card');

      if (detectedType && value.length >= 2) {
        cardBadge.textContent = getCardDisplayName(detectedType);
        cardBadge.classList.add('visible', detectedType);
        
        if (iconElements[detectedType]) {
          iconElements[detectedType].classList.add('active');
        }
      } else if (value.length === 0) {
        cardBadge.classList.remove('visible');
      }
    }

    cardInput.addEventListener('input', updateCardDetection);
    cardInput.addEventListener('keyup', updateCardDetection);

    // -------------------------------------------------------------
    // 5. Load order summary
    // -------------------------------------------------------------
    const orderContent = document.getElementById('orderContent');
    const messageBox = document.getElementById('messageBox');
    let currentCar = null;

    function loadOrder() {
      const carId = getParam('carId');
      if (!carId) {
        orderContent.innerHTML = `
          <div style="text-align:center; padding:20px; color:#888;">
            <i class="fas fa-exclamation-circle" style="font-size:2rem; display:block; margin-bottom:12px;"></i>
            No car selected. Please go back and choose a car.
          </div>
        `;
        return;
      }

      const car = findCarById(carId);
      currentCar = car;
      
      if (!car) {
        orderContent.innerHTML = `
          <div style="text-align:center; padding:20px; color:#888;">
            <i class="fas fa-exclamation-circle" style="font-size:2rem; display:block; margin-bottom:12px;"></i>
            Car not found.
          </div>
        `;
        return;
      }

      const taxRate = 0.15;
      const dailyRate = car.price;
      const tax = dailyRate * taxRate;
      const total = dailyRate + tax;

      orderContent.innerHTML = `
        <div class="order-car">
          <img src="${car.image}" alt="${car.name}" />
          <div class="car-info">
            <h3>${car.name}</h3>
            <div class="price">$${car.price} <small>/ day</small></div>
          </div>
        </div>
        <div class="order-details">
          <div class="row"><span>Daily Rate</span><span>$${car.price.toFixed(2)}</span></div>
          <div class="row"><span>Tax (15%)</span><span>$${tax.toFixed(2)}</span></div>
          <div class="row"><span>Insurance</span><span>Included</span></div>
          <div class="row total"><span>Total</span><span>$${total.toFixed(2)}</span></div>
        </div>
      `;

      document.getElementById('checkoutForm').dataset.total = total.toFixed(2);
    }

    // -------------------------------------------------------------
    // 6. SAVE RESERVATION TO FIREBASE
    // -------------------------------------------------------------
    async function saveReservationToFirebase(bookingData) {
      try {
        const docRef = await addDoc(collection(db, 'reservations'), {
          customerName: bookingData.fullName,
          email: bookingData.email,
          phone: bookingData.phone,
          carName: bookingData.carName,
          carId: bookingData.carId,
          carPrice: bookingData.carPrice,
          days: bookingData.days,
          totalPrice: bookingData.totalPrice,
          pickupDate: bookingData.pickupDate,
          returnDate: bookingData.returnDate,
          pickupLocation: bookingData.pickupLocation,
          notes: bookingData.notes || '',
          status: 'pending',
          createdAt: new Date()
        });
        console.log('✅ Reservation saved to Firebase with ID:', docRef.id);
        return true;
      } catch (error) {
        console.error('❌ Error saving reservation:', error);
        throw error;
      }
    }

    // -------------------------------------------------------------
    // 7. Form submission
    // -------------------------------------------------------------
    const form = document.getElementById('checkoutForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const btnSpinner = document.getElementById('btnSpinner');

    function showMessage(message, type) {
      messageBox.textContent = message;
      messageBox.className = 'message-box';
      if (type === 'success') {
        messageBox.classList.add('success');
      } else if (type === 'error') {
        messageBox.classList.add('error');
      }
      setTimeout(() => {
        messageBox.className = 'message-box';
      }, 6000);
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const pickupLocation = document.getElementById('pickupLocation').value;
      const pickupDate = document.getElementById('pickupDate').value;
      const returnDate = document.getElementById('returnDate').value;
      const cardNumber = document.getElementById('cardNumber').value.trim();
      const expiryDate = document.getElementById('expiryDate').value.trim();
      const cvv = document.getElementById('cvv').value.trim();
      const notes = document.getElementById('notes').value.trim();
      const terms = document.getElementById('terms').checked;

      // Validation
      if (!fullName || !email || !phone || !pickupLocation || !pickupDate || !returnDate ||
          !cardNumber || !expiryDate || !cvv || !terms) {
        showMessage('Please fill in all required fields and accept the terms.', 'error');
        return;
      }

      if (!email.includes('@') || !email.includes('.')) {
        showMessage('Please enter a valid email address.', 'error');
        return;
      }

      const cardClean = cardNumber.replace(/\s/g, '');
      if (cardClean.length < 13 || cardClean.length > 19) {
        showMessage('Please enter a valid card number (13-19 digits).', 'error');
        return;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const pickup = new Date(pickupDate);
      const returnD = new Date(returnDate);

      if (pickup < today) {
        showMessage('Pickup date cannot be in the past.', 'error');
        return;
      }
      if (returnD <= pickup) {
        showMessage('Return date must be after pickup date.', 'error');
        return;
      }

      if (!currentCar) {
        showMessage('Car information is missing. Please go back and select a car.', 'error');
        return;
      }

      // Calculate days
      const diffTime = Math.abs(returnD - pickup);
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      // Calculate total
      const totalPrice = currentCar.price * diffDays;

      // Prepare booking data
      const bookingData = {
        fullName: fullName,
        email: email,
        phone: phone,
        carName: currentCar.name,
        carId: currentCar.id,
        carPrice: currentCar.price,
        days: diffDays,
        totalPrice: totalPrice,
        pickupDate: pickupDate,
        returnDate: returnDate,
        pickupLocation: pickupLocation,
        notes: notes,
        cardType: detectCardType(cardNumber) || 'Unknown'
      };

      // Disable submit button
      submitBtn.disabled = true;
      btnText.textContent = 'Processing...';
      btnIcon.style.display = 'none';
      btnSpinner.style.display = 'inline-block';

      try {
        // Save to Firebase
        await saveReservationToFirebase(bookingData);
        
        // Show success message
        showMessage(`✅ Booking confirmed! Your reservation for the ${currentCar.name} has been saved. A confirmation email will be sent to ${email}.`, 'success');
        btnText.textContent = '✓ Booked!';
        btnSpinner.style.display = 'none';
        
        // Log to console
        console.log('===== BOOKING CONFIRMED =====');
        console.log('Car:', currentCar.name);
        console.log('Customer:', fullName, email, phone);
        console.log('Pickup:', pickupLocation, pickupDate);
        console.log('Return:', returnDate);
        console.log('Days:', diffDays);
        console.log('Total: $' + totalPrice);
        console.log('Card Type:', bookingData.cardType);
        console.log('==============================');

        // Reset button after delay
        setTimeout(() => {
          btnText.textContent = 'Confirm & Book';
          btnIcon.style.display = 'inline-block';
          btnSpinner.style.display = 'none';
          submitBtn.disabled = false;
        }, 4000);

      } catch (error) {
        showMessage(`❌ Booking failed: ${error.message}. Please try again.`, 'error');
        btnText.textContent = 'Confirm & Book';
        btnIcon.style.display = 'inline-block';
        btnSpinner.style.display = 'none';
        submitBtn.disabled = false;
      }
    });

    // -------------------------------------------------------------
    // 8. Card formatting
    // -------------------------------------------------------------
    document.getElementById('cardNumber').addEventListener('input', function(e) {
      let value = this.value.replace(/\D/g, '');
      if (value.length > 16) value = value.slice(0, 16);
      let formatted = '';
      for (let i = 0; i < value.length; i++) {
        if (i > 0 && i % 4 === 0) formatted += ' ';
        formatted += value[i];
      }
      this.value = formatted;
      updateCardDetection();
    });

    document.getElementById('expiryDate').addEventListener('input', function(e) {
      let value = this.value.replace(/\D/g, '');
      if (value.length > 4) value = value.slice(0, 4);
      if (value.length >= 2) {
        const month = parseInt(value.slice(0, 2));
        if (month > 12) {
          this.value = '12' + value.slice(2);
          return;
        }
      }
      if (value.length > 2) {
        this.value = value.slice(0, 2) + '/' + value.slice(2);
      } else {
        this.value = value;
      }
    });

    document.getElementById('cvv').addEventListener('input', function(e) {
      this.value = this.value.replace(/\D/g, '').slice(0, 4);
    });

    // -------------------------------------------------------------
    // 9. Set default dates
    // -------------------------------------------------------------
    function setDefaultDates() {
      const today = new Date();
      const pickup = new Date(today);
      pickup.setDate(today.getDate() + 3);
      const returnD = new Date(today);
      returnD.setDate(today.getDate() + 6);

      const formatDate = (date) => {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      };

      document.getElementById('pickupDate').value = formatDate(pickup);
      document.getElementById('returnDate').value = formatDate(returnD);
    }

    // -------------------------------------------------------------
    // 10. INIT
    // -------------------------------------------------------------
    loadOrder();
    setDefaultDates();
    updateCardDetection();

  </script>
</body>
</html>
